pack_id: ca_ccp
version: 3
status: active
title: "California Code of Civil Procedure - civil discovery (generic state pack)"
jurisdiction_kind: state
source_checked: "2026-07-20"
source_url: "https://leginfo.legislature.ca.gov/faces/codes.xhtml"
overlays_allowed: [ca_san_bernardino]
rules:
  - id: CCP-2017-010
    citation: "Cal. Code Civ. Proc. sec. 2017.010"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2017.010."
    summary: "Discovery scope covers nonprivileged matter relevant to the pending action, subject to the statute's admissibility / discovery-of-admissible-evidence framing."
    applies_to: [all]
    check_hints: [scope, relevance, privilege, overbreadth]

  - id: CCP-2019-010
    citation: "Cal. Code Civ. Proc. sec. 2019.010"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2019.010."
    summary: "Permitted discovery methods include interrogatories, inspection demands, and requests for admission."
    applies_to: [all]
    check_hints: [methods, sequence, timing]

  - id: CCP-2019-030
    citation: "Cal. Code Civ. Proc. sec. 2019.030"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2019.030."
    summary: "Court may restrict discovery that is unreasonably cumulative, duplicative, or unduly burdensome/expensive relative to the case."
    applies_to: [all]
    check_hints: [proportionality, cumulative, burden]

  - id: CCP-2030-030
    citation: "Cal. Code Civ. Proc. sec. 2030.030"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.030."
    summary: "A party may propound 35 specially prepared interrogatories, plus official-form interrogatories, subject to statutory exceptions."
    applies_to: [rog]
    check_hints: [numerical_limit, interrogatory, discrete_subparts]

  - id: CCP-2030-060
    citation: "Cal. Code Civ. Proc. sec. 2030.060"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.060."
    summary: "Interrogatories must be full and complete in themselves; no unapproved preface/instruction; discrete subparts may count toward limits."
    applies_to: [rog]
    check_hints: [form, discrete_subparts, contention_interrogatory]

  - id: CCP-2030-210
    citation: "Cal. Code Civ. Proc. sec. 2030.210"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.210."
    summary: "Interrogatory responses must answer, exercise the option to produce writings, or object; response drafting remains attorney-controlled."
    applies_to: [rog]
    check_hints: [objection_specificity, verification, waiver_risk]

  - id: CCP-2031-030
    citation: "Cal. Code Civ. Proc. sec. 2031.030"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2031.030."
    summary: "Inspection demands must designate documents with reasonable particularity and may specify form of ESI production."
    applies_to: [rfp]
    check_hints: [particularity, overbreadth, esi_form, production]

  - id: CCP-2031-210
    citation: "Cal. Code Civ. Proc. sec. 2031.210"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2031.210."
    summary: "Inspection-demand responses must state compliance, inability to comply, or objection. Withholding particulars and privilege-log facts belong in CCP 2031.240."
    applies_to: [rfp]
    check_hints: [response_form, objection_specificity, production_manner]

  - id: CCP-2031-240
    citation: "Cal. Code Civ. Proc. sec. 2031.240"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2031.240."
    summary: "An objection to an inspection demand must identify the responsive material with particularity, state the extent and grounds of objection, and provide enough factual information to evaluate privilege/work-product claims, including a privilege log if necessary."
    applies_to: [rfp]
    check_hints: [withholding_statement, privilege_log, objection_specificity]

  - id: CCP-2031-280
    citation: "Cal. Code Civ. Proc. sec. 2031.280"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2031.280."
    summary: "Documents produced must be identified with the specific request to which they respond, or produced as kept in ordinary course."
    applies_to: [rfp]
    check_hints: [production_manner, labeling]

  - id: CCP-2033-030
    citation: "Cal. Code Civ. Proc. sec. 2033.030"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.030."
    summary: "Unless a statutory declaration or order allows more, a party may propound 35 RFAs that do not relate to document genuineness."
    applies_to: [rfa]
    check_hints: [numerical_limit, admission]

  - id: CCP-2033-060
    citation: "Cal. Code Civ. Proc. sec. 2033.060"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.060."
    summary: "Each request for admission must be full and complete in itself and separately set forth."
    applies_to: [rfa]
    check_hints: [separately_stated, compound, form]

  - id: CCP-2033-210
    citation: "Cal. Code Civ. Proc. sec. 2033.210"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.210."
    summary: "Responses to RFAs must be an answer or an objection, signed by the party or attorney as required."
    applies_to: [rfa]
    check_hints: [admission_answer, lack_information, objection_specificity]

  - id: CCP-2033-220
    citation: "Cal. Code Civ. Proc. sec. 2033.220"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.220."
    summary: "Each answer must fairly meet the substance of the request; qualified admissions are permitted when good faith requires."
    applies_to: [rfa]
    check_hints: [qualify, fair_meet, admission_answer]

  - id: CCP-2033-280
    citation: "Cal. Code Civ. Proc. sec. 2033.280"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.280."
    summary: "Failure to serve timely RFA responses waives objections and permits a motion to have genuineness/truth deemed admitted; monetary sanctions are mandatory. This is the no-timely-response deemed-admission statute, distinct from CCP 2033.290 further-response motion practice."
    applies_to: [rfa]
    check_hints: [deemed_admitted, waiver, sanctions_mandatory, no_timely_response]

  - id: CCP-2033-290
    citation: "Cal. Code Civ. Proc. sec. 2033.290"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.290."
    summary: "On receipt of responses to requests for admission, a party may move to compel further responses when answers or objections are insufficient. Do not use this section as the no-response deemed-admission authority."
    applies_to: [rfa]
    check_hints: [further_response, insufficient_answer, distinction_from_no_response]

  - id: CCP-2030-300
    citation: "Cal. Code Civ. Proc. sec. 2030.300"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.300."
    summary: "On receipt of responses to interrogatories, a party may move to compel further responses when an answer is evasive, incomplete, or objection is too general or without merit. No-timely-response deemed-admission posture is separate (sec. 2030.290)."
    applies_to: [rog]
    check_hints: [motion_to_compel, further_response, evasive, incomplete]

  - id: CCP-2031-310
    citation: "Cal. Code Civ. Proc. sec. 2031.310"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2031.310."
    summary: "On receipt of responses to an inspection demand, a party may move to compel further responses when a statement of compliance is incomplete, an objection is too general or without merit, or no response was served. Distinct from sec. 2031.320 no-timely-response posture."
    applies_to: [rfp]
    check_hints: [motion_to_compel, further_response, incomplete_compliance, no_response]

  - id: CCP-2016-040
    citation: "Cal. Code Civ. Proc. sec. 2016.040"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2016.040."
    summary: "Discovery motions requiring a meet-and-confer declaration must show a reasonable and good-faith attempt to resolve each issue in person, by telephone, or by videoconference, and address retention of a shorthand reporter when applicable. AB 1521 amendments are effective Jan. 1, 2026."
    applies_to: [all]
    check_hints: [meet_confer, declaration, motion_prerequisite, ab_1521_2026]

  - id: CCP-2023-010
    citation: "Cal. Code Civ. Proc. sec. 2023.010"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2023.010."
    summary: "Misuses of discovery include failing to confer in person, by telephone, or by videoconference when required, along with other discovery abuses. AB 1521 amendments are effective Jan. 1, 2026."
    applies_to: [all]
    check_hints: [discovery_misuse, meet_confer, sanctions, ab_1521_2026]

  - id: CCP-2023-050
    citation: "Cal. Code Civ. Proc. sec. 2023.050"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2023.050."
    summary: "Mandatory $1,000 sanction applies to specified document-production and meet-and-confer misconduct, subject to statutory exceptions. SB 235 increased the sanction from $250 to $1,000 effective Jan. 1, 2024."
    applies_to: [all]
    check_hints: [sanctions_mandatory, monetary, production_misconduct, sb_235]

  - id: CCP-2017-020
    citation: "Cal. Code Civ. Proc. sec. 2017.020"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2017.020."
    summary: "The court shall limit the scope of discovery when the burden, expense, or intrusiveness clearly outweighs the likelihood that the information sought will lead to admissible evidence; this determination may be made on a motion for a protective order, accompanied by a meet-and-confer declaration."
    applies_to: [all]
    check_hints: [proportionality, scope, protective_order, burden, meet_confer]

  - id: CCP-2030-240
    citation: "Cal. Code Civ. Proc. sec. 2030.240"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.240."
    summary: "An objection to an interrogatory must state the specific ground; a privilege objection must state the particular privilege invoked, and a work-product claim must be expressly asserted. If only part of an interrogatory is objectionable, the remainder must be answered."
    applies_to: [rog]
    check_hints: [objection_specificity, privilege, work_product, partial_objection]

  - id: CCP-2030-090
    citation: "Cal. Code Civ. Proc. sec. 2030.090"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.090."
    summary: "When interrogatories have been propounded, the responding party or an affected person may promptly move for a protective order, accompanied by a meet-and-confer declaration. For good cause shown, the court may make any order justice requires to protect against unwarranted annoyance, embarrassment, oppression, or undue burden and expense."
    applies_to: [rog]
    check_hints: [protective_order, good_cause, meet_confer, burden]

  - id: CCP-2031-060
    citation: "Cal. Code Civ. Proc. sec. 2031.060"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2031.060."
    summary: "When an inspection, copying, testing, or sampling of documents, tangible things, places, or electronically stored information has been demanded, the responding party or an affected person may promptly move for a protective order, accompanied by a meet-and-confer declaration. For good cause shown, the court may make any order justice requires to protect against unwarranted annoyance, embarrassment, oppression, or undue burden and expense."
    applies_to: [rfp]
    check_hints: [protective_order, good_cause, meet_confer, burden, esi]

  - id: CCP-2033-230
    citation: "Cal. Code Civ. Proc. sec. 2033.230"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.230."
    summary: "If only part of a request for admission is objectionable, the remainder must be answered. An objection must state the specific ground; a privilege objection must state the particular privilege invoked, and a work-product claim must be expressly asserted."
    applies_to: [rfa]
    check_hints: [objection_specificity, privilege, work_product, partial_objection]

  - id: CCP-2033-080
    citation: "Cal. Code Civ. Proc. sec. 2033.080"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2033.080."
    summary: "When requests for admission have been made, the responding party may promptly move for a protective order, accompanied by a meet-and-confer declaration. For good cause shown, the court may make any order justice requires to protect against unwarranted annoyance, embarrassment, oppression, or undue burden and expense."
    applies_to: [rfa]
    check_hints: [protective_order, good_cause, meet_confer, burden]

  - id: CCP-2025-420
    citation: "Cal. Code Civ. Proc. sec. 2025.420"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2025.420."
    summary: "Before, during, or after a deposition, any party, deponent, or other affected person may promptly move for a protective order, accompanied by a meet-and-confer declaration. For good cause shown, the court may make any order justice requires to protect against unwarranted annoyance, embarrassment, oppression, or undue burden and expense."
    applies_to: [all]
    check_hints: [protective_order, deposition, good_cause, meet_confer]

  - id: CCP-UD-10-DAY-DISCOVERY
    citation: "Cal. Code Civ. Proc. secs. 2030.020, 2031.020, 2033.020"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2030.020."
    summary: "In unlawful-detainer actions, interrogatories, inspection demands, and RFAs may be served 10 days after service of summons or appearance, whichever occurs first, under AB 1521 amendments effective Jan. 1, 2026."
    applies_to: [rog, rfp, rfa]
    check_hints: [unlawful_detainer, early_discovery, ten_day_timing, ab_1521_2026]

  - id: CCP-2034-210
    citation: "Cal. Code Civ. Proc. sec. 2034.210"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2034.210."
    summary: "After an initial trial date is set, a party may demand simultaneous exchange of expert trial witness information."
    applies_to: [expert]
    check_hints: [expert_exchange, expert_disclosure, trial_date]

  - id: CCP-2034-260
    citation: "Cal. Code Civ. Proc. sec. 2034.260"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displayText.xhtml?article=2.&chapter=18.&division=&lawCode=CCP&part=4.&title=4."
    summary: "Expert exchange must identify expected expert witnesses or state no present intent; retained/party/employee experts require the statutory declaration content."
    applies_to: [expert]
    check_hints: [expert_exchange, expert_declaration, expert_qualification, expert_opinions, fees]

  - id: CCP-2034-280
    citation: "Cal. Code Civ. Proc. sec. 2034.280"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2034.280."
    summary: "A party that participated in the exchange may supplement with experts on subjects first covered by an adverse party's designation, subject to statutory timing and deposition availability."
    applies_to: [expert]
    check_hints: [supplemental_expert, rebuttal_expert, deposition_availability]

  - id: CCP-2034-300
    citation: "Cal. Code Civ. Proc. sec. 2034.300"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=CCP&sectionNum=2034.300."
    summary: "Unreasonable failure to list, declare, produce discoverable expert writings, or make the expert available for deposition creates exclusion risk on objection."
    applies_to: [expert]
    check_hints: [expert_exclusion, expert_declaration, expert_reports, deposition_availability]

  - id: EVID-720
    citation: "Cal. Evid. Code sec. 720"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=EVID&sectionNum=720."
    summary: "Expert qualification turns on special knowledge, skill, experience, training, or education sufficient for the subject of testimony."
    applies_to: [expert]
    check_hints: [expert_qualification, liability_expert, damages_expert]

  - id: EVID-801
    citation: "Cal. Evid. Code sec. 801"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=EVID&sectionNum=801."
    summary: "Expert opinion must assist on a subject beyond common experience and rest on matter of a type reasonably relied on in the field."
    applies_to: [expert]
    check_hints: [expert_opinion_basis, expert_fit, reliable_basis]

  - id: EVID-801-1
    citation: "Cal. Evid. Code sec. 801.1"
    source_url: "https://leginfo.legislature.ca.gov/faces/codes_displayText.xhtml?article=1.&chapter=1.&division=7.&lawCode=EVID&part=&title="
    summary: "In a general civil case, a qualified expert may offer medical-causation opinions to a reasonable medical probability based on a differential diagnosis or other reliable methodology. SB 652 added the section; SB 135 scoped/amended the operative text, operative Jan. 1, 2024."
    applies_to: [expert]
    check_hints: [medical_causation, reasonable_medical_probability, plaintiff_damages, sb_652, sb_135]
